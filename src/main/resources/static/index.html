<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App - Complete Testing Suite</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .main-container {
            max-width: 1600px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .profile-header {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }

        .chat-header {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        }

        .content {
            padding: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #334155;
            font-weight: 500;
            font-size: 13px;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 13px;
            transition: all 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-small {
            padding: 8px 12px;
            font-size: 12px;
            width: auto;
            margin-top: 5px;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }

        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }

        /* Toast Notification */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }

        .toast {
            background: white;
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 300px;
            animation: slideInRight 0.3s ease-out;
            cursor: pointer;
        }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .toast.success { border-left: 4px solid #22c55e; }
        .toast.error { border-left: 4px solid #ef4444; }
        .toast.info { border-left: 4px solid #3b82f6; }

        .toast-icon {
            font-size: 20px;
        }

        .toast-content {
            flex: 1;
        }

        .toast-title {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .toast-message {
            font-size: 12px;
            color: #64748b;
        }

        .toast-close {
            cursor: pointer;
            font-size: 18px;
            color: #94a3b8;
        }

        .token-box {
            margin-top: 15px;
            padding: 12px;
            background: #f1f5f9;
            border-radius: 10px;
            display: none;
        }

        .token-box.show {
            display: block;
        }

        .token-value {
            font-family: monospace;
            font-size: 10px;
            word-break: break-all;
            background: white;
            padding: 8px;
            border-radius: 8px;
            max-height: 80px;
            overflow: auto;
        }

        .api-response {
            background: #1e293b;
            color: #a5f3fc;
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 10px;
            margin-top: 10px;
            max-height: 200px;
            overflow: auto;
            display: none;
            white-space: pre-wrap;
        }

        .api-response.show {
            display: block;
        }

        .api-response.error {
            background: #7f1d1d;
            color: #fecaca;
        }

        .chat-messages {
            background: #f8fafc;
            border-radius: 10px;
            padding: 10px;
            height: 300px;
            overflow-y: auto;
            border: 1px solid #e2e8f0;
            margin-bottom: 10px;
        }

        .chat-message {
            padding: 8px;
            margin-bottom: 8px;
            background: white;
            border-radius: 8px;
            border-left: 3px solid #667eea;
            font-size: 12px;
        }

        .chat-message.own {
            background: #ede9fe;
            border-left-color: #8b5cf6;
        }

        .chat-message .sender {
            font-weight: bold;
            color: #4c1d95;
            font-size: 11px;
        }

        .chat-message .time {
            font-size: 9px;
            color: #64748b;
            float: right;
        }

        @media (max-width: 1200px) {
            .main-container { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 768px) {
            .main-container { grid-template-columns: 1fr; }
        }

        .loading {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-left: 5px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
<div class="main-container">
    <!-- Card 1: Authentication -->
    <div class="card">
        <div class="header">
            <h2>🔐 Authentication</h2>
            <p>Login & Register</p>
        </div>
        <div class="content">
            <div class="form-group">
                <label>📧 Email</label>
                <input type="email" id="authEmail" placeholder="Enter email">
            </div>
            <div class="form-group">
                <label>🔒 Password</label>
                <input type="password" id="authPassword" placeholder="Password">
            </div>
            <div class="form-group">
                <label>👤 Name (for registration)</label>
                <input type="text" id="authName" placeholder="Your name">
            </div>
            <div class="form-group">
                <label>🔑 OTP Code</label>
                <input type="text" id="authOtp" placeholder="6-digit OTP">
            </div>
            
            <button onclick="sendOtp()" id="sendOtpBtn">1. Send OTP</button>
            <button onclick="verifyOtp()" id="verifyOtpBtn" style="margin-top: 8px;">2. Verify OTP</button>
            <button onclick="register()" id="registerBtn" style="margin-top: 8px;">3. Register</button>
            <button onclick="login()" id="loginBtn" style="margin-top: 8px;">4. Login</button>
            
            <div id="tokenBox" class="token-box">
                <div class="token-label">🎫 JWT Token</div>
                <div class="token-value" id="tokenValue"></div>
                <button class="btn-small" onclick="copyToken()">📋 Copy Token</button>
            </div>
        </div>
    </div>

    <!-- Card 2: Profile Management -->
    <div class="card">
        <div class="header profile-header">
            <h2>👤 Profile Management</h2>
            <p>Update profile, change password</p>
        </div>
        <div class="content">
            <div class="form-group">
                <label>🔑 JWT Token</label>
                <input type="text" id="profileToken" placeholder="Paste JWT token here">
            </div>
            <button onclick="getProfile()" class="btn-small">📖 Get My Profile</button>
            
            <div class="form-group" style="margin-top: 15px;">
                <label>✏️ Update Name</label>
                <input type="text" id="updateName" placeholder="New name">
            </div>
            <div class="form-group">
                <label>📝 Update Bio</label>
                <textarea id="updateBio" rows="2" placeholder="Tell something about yourself"></textarea>
            </div>
            <div class="form-group">
                <label>🖼️ Avatar URL</label>
                <input type="text" id="updateAvatar" placeholder="https://example.com/avatar.jpg">
            </div>
            <button onclick="updateProfile()" class="btn-small">💾 Update Profile</button>
            
            <div class="form-group" style="margin-top: 15px;">
                <label>🔐 Current Password</label>
                <input type="password" id="currentPassword" placeholder="Current password">
            </div>
            <div class="form-group">
                <label>🆕 New Password</label>
                <input type="password" id="newPassword" placeholder="New password (min 6 chars)">
            </div>
            <button onclick="changePassword()" class="btn-small">🔒 Change Password</button>
            
            <div class="form-group" style="margin-top: 15px;">
                <label>📧 Email for Reset</label>
                <input type="email" id="resetEmail" placeholder="Email for password reset">
            </div>
            <button onclick="forgotPassword()" class="btn-small">📧 Forgot Password</button>
            
            <div id="profileResponse" class="api-response"></div>
        </div>
    </div>

    <!-- Card 3: Chat System -->
    <div class="card">
        <div class="header chat-header">
            <h2>💬 Real-time Chat</h2>
            <p>WebSocket + Auto-delete (3 days)</p>
        </div>
        <div class="content">
            <div class="form-group">
                <label>🔑 JWT Token</label>
                <input type="text" id="chatToken" placeholder="Paste JWT token here">
            </div>
            <button onclick="connectWebSocket()" class="btn-small btn-success">🔌 Connect to Chat</button>
            <button onclick="disconnectWebSocket()" class="btn-small btn-danger">❌ Disconnect</button>
            
            <div id="connectionStatus" style="margin: 10px 0; padding: 5px; border-radius: 5px; text-align: center; font-size: 12px; background: #f1f5f9;">
                ⚫ Disconnected
            </div>
            
            <div class="form-group">
                <label>👥 Room ID (or use email for private)</label>
                <input type="text" id="roomId" placeholder="public-room or user@example.com">
            </div>
            <div class="form-group">
                <label>📨 Message</label>
                <input type="text" id="messageContent" placeholder="Type your message...">
            </div>
            <button onclick="sendMessage()" id="sendMsgBtn">📤 Send Message</button>
            
            <div class="chat-messages" id="chatMessages">
                <div style="text-align: center; color: #64748b; padding: 20px;">Connect to start chatting</div>
            </div>
            
            <div class="form-group" style="margin-top: 10px;">
                <label>📜 Get Chat History</label>
                <input type="text" id="historyRoomId" placeholder="Room ID">
                <button onclick="getChatHistory()" class="btn-small" style="margin-top: 5px;">📜 Load History</button>
            </div>
        </div>
    </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<script>
    const BASE_URL = "http://localhost:8080";
    let stompClient = null;
    let currentUserEmail = "";
    
    // ============ TOAST NOTIFICATIONS ============
    function showToast(title, message, type = 'info') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        
        const icons = {
            success: '✅',
            error: '❌',
            info: 'ℹ️'
        };
        
        toast.innerHTML = `
            <div class="toast-icon">${icons[type] || 'ℹ️'}</div>
            <div class="toast-content">
                <div class="toast-title">${title}</div>
                <div class="toast-message">${message}</div>
            </div>
            <div class="toast-close" onclick="this.parentElement.remove()">✕</div>
        `;
        
        toast.onclick = (e) => {
            if(e.target.className !== 'toast-close') {
                toast.remove();
            }
        };
        
        container.appendChild(toast);
        
        setTimeout(() => {
            if(toast.parentElement) toast.remove();
        }, 5000);
    }
    
    // ============ AUTHENTICATION ============
    async function sendOtp() {
        const email = document.getElementById('authEmail').value;
        if(!email) {
            showToast('Validation Error', 'Email is required', 'error');
            return;
        }
        if(!email.includes('@')) {
            showToast('Validation Error', 'Please enter a valid email address', 'error');
            return;
        }
        
        const btn = document.getElementById('sendOtpBtn');
        btn.disabled = true;
        btn.innerHTML = 'Sending... <span class="loading"></span>';
        
        try {
            const res = await fetch(`${BASE_URL}/auth/send-otp`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email })
            });
            const data = await res.json();
            
            if(res.ok) {
                showToast('Success', data.message || 'OTP sent successfully! Check your email', 'success');
            } else {
                const errorMsg = data.error || data.message || 'Failed to send OTP';
                showToast('Error', errorMsg, 'error');
            }
        } catch(error) {
            showToast('Network Error', `Cannot connect to server: ${error.message}`, 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '1. Send OTP';
        }
    }
    
    async function verifyOtp() {
        const email = document.getElementById('authEmail').value;
        const otp = document.getElementById('authOtp').value;
        
        if(!email || !otp) {
            showToast('Validation Error', 'Email and OTP are required', 'error');
            return;
        }
        if(otp.length !== 6) {
            showToast('Validation Error', 'OTP must be 6 digits', 'error');
            return;
        }
        
        const btn = document.getElementById('verifyOtpBtn');
        btn.disabled = true;
        btn.innerHTML = 'Verifying... <span class="loading"></span>';
        
        try {
            const res = await fetch(`${BASE_URL}/auth/verify-otp`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, otp })
            });
            const data = await res.json();
            
            if(res.ok) {
                showToast('Success', data.message || 'OTP verified successfully!', 'success');
            } else {
                const errorMsg = data.error || data.message || 'Invalid OTP';
                showToast('Error', errorMsg, 'error');
            }
        } catch(error) {
            showToast('Network Error', `Cannot connect to server: ${error.message}`, 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '2. Verify OTP';
        }
    }
    
    async function register() {
        const name = document.getElementById('authName').value;
        const email = document.getElementById('authEmail').value;
        const password = document.getElementById('authPassword').value;
        
        if(!name || !email || !password) {
            showToast('Validation Error', 'All fields (Name, Email, Password) are required', 'error');
            return;
        }
        if(password.length < 6) {
            showToast('Validation Error', 'Password must be at least 6 characters', 'error');
            return;
        }
        
        const btn = document.getElementById('registerBtn');
        btn.disabled = true;
        btn.innerHTML = 'Registering... <span class="loading"></span>';
        
        try {
            const res = await fetch(`${BASE_URL}/auth/register`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name, email, password })
            });
            const data = await res.json();
            
            if(res.ok) {
                showToast('Success', data.message || 'Registration successful! Please login', 'success');
                // Auto-fill login fields
                document.getElementById('authPassword').value = password;
            } else {
                const errorMsg = data.error || data.message || 'Registration failed';
                showToast('Error', errorMsg, 'error');
            }
        } catch(error) {
            showToast('Network Error', `Cannot connect to server: ${error.message}`, 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '3. Register';
        }
    }
    
    async function login() {
        const email = document.getElementById('authEmail').value;
        const password = document.getElementById('authPassword').value;
        
        if(!email || !password) {
            showToast('Validation Error', 'Email and password are required', 'error');
            return;
        }
        
        const btn = document.getElementById('loginBtn');
        btn.disabled = true;
        btn.innerHTML = 'Logging in... <span class="loading"></span>';
        
        try {
            const res = await fetch(`${BASE_URL}/auth/login`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            
            if(res.ok) {
                showToast('Success', 'Login successful! Welcome back!', 'success');
                showToken(data.token);
                document.getElementById('profileToken').value = data.token;
                document.getElementById('chatToken').value = data.token;
                currentUserEmail = email;
                showToast('Info', 'JWT Token saved. You can now use Profile and Chat features', 'info');
            } else {
                const errorMsg = data.error || data.message || 'Login failed';
                showToast('Error', errorMsg, 'error');
            }
        } catch(error) {
            showToast('Network Error', `Cannot connect to server: ${error.message}`, 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '4. Login';
        }
    }
    
    // ============ PROFILE MANAGEMENT ============
    async function getProfile() {
        const token = document.getElementById('profileToken').value;
        if(!token) {
            showToast('Validation Error', 'JWT token is required. Please login first', 'error');
            return;
        }
        
        try {
            const res = await fetch(`${BASE_URL}/profile/me`, {
                headers: { "Authorization": `Bearer ${token}` }
            });
            const data = await res.json();
            
            if(res.ok) {
                showApiResponse('profileResponse', data);
                showToast('Success', 'Profile loaded successfully!', 'success');
                document.getElementById('updateName').value = data.name || '';
                document.getElementById('updateBio').value = data.bio || '';
                document.getElementById('updateAvatar').value = data.avatarUrl || '';
            } else {
                const errorMsg = data.error || 'Failed to load profile';
                showApiResponse('profileResponse', data, true);
                showToast('Error', errorMsg, 'error');
            }
        } catch(error) {
            showToast('Network Error', `Cannot connect to server: ${error.message}`, 'error');
        }
    }
    
    async function updateProfile() {
        const token = document.getElementById('profileToken').value;
        const name = document.getElementById('updateName').value;
        const bio = document.getElementById('updateBio').value;
        const avatarUrl = document.getElementById('updateAvatar').value;
        
        if(!token) {
            showToast('Validation Error', 'JWT token is required', 'error');
            return;
        }
        
        try {
            const res = await fetch(`${BASE_URL}/profile/update`, {
                method: "PUT",
                headers: { 
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}`
                },
                body: JSON.stringify({ name, bio, avatarUrl })
            });
            const data = await res.json();
            
            if(res.ok) {
                showApiResponse('profileResponse', data);
                showToast('Success', 'Profile updated successfully!', 'success');
            } else {
                const errorMsg = data.error || 'Update failed';
                showApiResponse('profileResponse', data, true);
                showToast('Error', errorMsg, 'error');
            }
        } catch(error) {
            showToast('Network Error', `Cannot connect to server: ${error.message}`, 'error');
        }
    }
    
    async function changePassword() {
        const token = document.getElementById('profileToken').value;
        const currentPassword = document.getElementById('currentPassword').value;
        const newPassword = document.getElementById('newPassword').value;
        
        if(!token || !currentPassword || !newPassword) {
            showToast('Validation Error', 'All password fields are required', 'error');
            return;
        }
        if(newPassword.length < 6) {
            showToast('Validation Error', 'New password must be at least 6 characters', 'error');
            return;
        }
        
        try {
            const res = await fetch(`${BASE_URL}/profile/change-password`, {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}`
                },
                body: JSON.stringify({ currentPassword, newPassword })
            });
            const data = await res.json();
            
            if(res.ok) {
                showToast('Success', data.message || 'Password changed successfully!', 'success');
                document.getElementById('currentPassword').value = '';
                document.getElementById('newPassword').value = '';
            } else {
                const errorMsg = data.error || data.message || 'Failed to change password';
                showToast('Error', errorMsg, 'error');
            }
        } catch(error) {
            showToast('Network Error', `Cannot connect to server: ${error.message}`, 'error');
        }
    }
    
    async function forgotPassword() {
        const email = document.getElementById('resetEmail').value;
        if(!email) {
            showToast('Validation Error', 'Email is required', 'error');
            return;
        }
        
        try {
            const res = await fetch(`${BASE_URL}/profile/forgot-password?email=${email}`, {
                method: "POST"
            });
            const data = await res.json();
            
            if(res.ok) {
                showToast('Success', data.message || 'Password reset link sent to your email!', 'success');
            } else {
                const errorMsg = data.error || data.message || 'Failed to send reset link';
                showToast('Error', errorMsg, 'error');
            }
        } catch(error) {
            showToast('Network Error', `Cannot connect to server: ${error.message}`, 'error');
        }
    }
    
    // ============ CHAT SYSTEM ============
    function connectWebSocket() {
        const token = document.getElementById('chatToken').value;
        if(!token) {
            showToast('Error', 'JWT token required. Please login first', 'error');
            return;
        }
        
        if(typeof SockJS === 'undefined') {
            showToast('Info', 'Loading WebSocket libraries...', 'info');
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js';
            document.head.appendChild(script);
            
            const script2 = document.createElement('script');
            script2.src = 'https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js';
            document.head.appendChild(script2);
            
            setTimeout(() => {
                showToast('Info', 'Libraries loaded. Click Connect again', 'info');
            }, 1000);
        } else {
            initWebSocketConnection(token);
        }
    }
    
    function initWebSocketConnection(token) {
        showToast('Info', 'Connecting to WebSocket...', 'info');
        
        const socket = new SockJS(`${BASE_URL}/ws`);
        stompClient = Stomp.over(socket);
        
        stompClient.connect({}, function(frame) {
            updateConnectionStatus(true);
            showToast('Success', 'Connected to chat server!', 'success');
            
            stompClient.subscribe('/topic/public', function(message) {
                const chatMessage = JSON.parse(message.body);
                displayChatMessage(chatMessage, false);
            });
            
            stompClient.subscribe('/user/queue/messages', function(message) {
                const chatMessage = JSON.parse(message.body);
                displayChatMessage(chatMessage, false);
                showToast('New Message', `From: ${chatMessage.senderEmail}`, 'info');
            });
            
        }, function(error) {
            updateConnectionStatus(false);
            showToast('Error', 'Connection failed: ' + error, 'error');
        });
    }
    
    function disconnectWebSocket() {
        if(stompClient) {
            stompClient.disconnect(function() {
                updateConnectionStatus(false);
                showToast('Info', 'Disconnected from chat', 'info');
            });
        }
    }
    
    function sendMessage() {
        if(!stompClient || !stompClient.connected) {
            showToast('Error', 'Not connected to chat. Please connect first', 'error');
            return;
        }
        
        const content = document.getElementById('messageContent').value;
        const roomId = document.getElementById('roomId').value || "public-room";
        
        if(!content) {
            showToast('Error', 'Message cannot be empty', 'error');
            return;
        }
        
        const chatMessage = {
            senderEmail: currentUserEmail,
            content: content,
            type: "CHAT",
            roomId: roomId,
            timestamp: new Date().toISOString()
        };
        
        stompClient.send("/app/chat.send", {}, JSON.stringify(chatMessage));
        document.getElementById('messageContent').value = '';
        showToast('Success', 'Message sent!', 'success');
    }
    
    function displayChatMessage(message, isOwn) {
        const chatDiv = document.getElementById('chatMessages');
        
        if(chatDiv.children.length === 1 && chatDiv.children[0].innerText.includes('Connect to')) {
            chatDiv.innerHTML = '';
        }
        
        const messageElement = document.createElement('div');
        messageElement.className = 'chat-message';
        if(isOwn || message.senderEmail === currentUserEmail) {
            messageElement.classList.add('own');
        }
        
        const time = new Date(message.timestamp).toLocaleTimeString();
        
        messageElement.innerHTML = `
            <div class="sender">${escapeHtml(message.senderEmail || 'Unknown')}</div>
            <div class="time">${time}</div>
            <div style="margin-top: 5px;">${escapeHtml(message.content)}</div>
        `;
        
        chatDiv.appendChild(messageElement);
        chatDiv.scrollTop = chatDiv.scrollHeight;
    }
    
    async function getChatHistory() {
        const roomId = document.getElementById('historyRoomId').value || "public-room";
        const token = document.getElementById('chatToken').value;
        
        if(!token) {
            showToast('Error', 'JWT token required', 'error');
            return;
        }
        
        showToast('Info', `Loading chat history for room: ${roomId}`, 'info');
        
        try {
            const res = await fetch(`${BASE_URL}/api/chat/messages/${roomId}?page=0&size=50`, {
                headers: { "Authorization": `Bearer ${token}` }
            });
            const data = await res.json();
            
            if(res.ok) {
                const chatDiv = document.getElementById('chatMessages');
                chatDiv.innerHTML = '';
                
                if(data.length === 0) {
                    chatDiv.innerHTML = '<div style="text-align: center; color: #64748b; padding: 20px;">No messages yet</div>';
                    showToast('Info', 'No messages found in this room', 'info');
                } else {
                    data.reverse().forEach(msg => displayChatMessage(msg, msg.senderEmail === currentUserEmail));
                    showToast('Success', `Loaded ${data.length} messages`, 'success');
                }
            } else {
                const errorMsg = data.error || 'Failed to load history';
                showToast('Error', errorMsg, 'error');
            }
        } catch(error) {
            showToast('Error', `Network error: ${error.message}`, 'error');
        }
    }
    
    function updateConnectionStatus(connected) {
        const statusDiv = document.getElementById('connectionStatus');
        if(connected) {
            statusDiv.innerHTML = '🟢 Connected to WebSocket';
            statusDiv.style.background = '#dcfce7';
        } else {
            statusDiv.innerHTML = '⚫ Disconnected';
            statusDiv.style.background = '#f1f5f9';
        }
    }
    
    // ============ UTILITY FUNCTIONS ============
    function showApiResponse(elementId, data, isError = false) {
        const responseDiv = document.getElementById(elementId);
        responseDiv.textContent = JSON.stringify(data, null, 2);
        responseDiv.className = `api-response show`;
        if(isError) responseDiv.classList.add('error');
        else responseDiv.classList.remove('error');
    }
    
    function showToken(token) {
        const tokenBox = document.getElementById('tokenBox');
        const tokenValue = document.getElementById('tokenValue');
        tokenValue.textContent = token;
        tokenBox.classList.add('show');
    }
    
    function copyToken() {
        const token = document.getElementById('tokenValue').textContent;
        navigator.clipboard.writeText(token);
        showToast('Success', 'Token copied to clipboard!', 'success');
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
</script>
</body>
</html>
